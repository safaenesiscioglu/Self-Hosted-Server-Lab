# Self-Hosted Server Lab — core stack
#
# Sanitized example compose. All secrets, paths and domains are read from .env
# (see .env.example). Copy .env.example to .env and fill in your own values.
#
# Some services (Immich, Ollama/Open WebUI, AllTalk TTS) ship their own
# version-specific compose files upstream — those are referenced in the README
# rather than duplicated here to avoid drift.

name: homelab

services:
  # ---------- Data layer ----------
  postgres:
    image: postgis/postgis:16-3.4
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks: [backend]

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1"]
    volumes:
      - ./data/redis:/data
    networks: [backend]

  # ---------- Cloud & files ----------
  nextcloud:
    image: nextcloud:29-apache
    container_name: nextcloud
    restart: unless-stopped
    depends_on: [postgres, redis]
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      NEXTCLOUD_TRUSTED_DOMAINS: ${NEXTCLOUD_DOMAIN}
    volumes:
      - ./data/nextcloud:/var/www/html
    ports:
      - "8080:80"
    networks: [backend, frontend]

  # ---------- Media ----------
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    volumes:
      - ./data/jellyfin/config:/config
      - ./data/jellyfin/cache:/cache
      - ${MEDIA_PATH}:/media:ro
    ports:
      - "8096:8096"
    networks: [frontend]

  # ---------- Automation & dashboards ----------
  homarr:
    image: ghcr.io/homarr-labs/homarr:latest
    container_name: homarr
    restart: unless-stopped
    volumes:
      - ./data/homarr:/appdata
    ports:
      - "7575:7575"
    networks: [frontend]

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    restart: unless-stopped
    volumes:
      - ./data/uptime-kuma:/app/data
    ports:
      - "3001:3001"
    networks: [frontend]

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    environment:
      N8N_HOST: ${N8N_HOST}
      GENERIC_TIMEZONE: ${TZ}
    volumes:
      - ./data/n8n:/home/node/.n8n
    ports:
      - "5678:5678"
    networks: [backend, frontend]

  # ---------- Management ----------
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data/portainer:/data
    ports:
      - "9443:9443"
    networks: [frontend]

  # ---------- Networking ----------
  # Exposes selected services over a custom domain without opening router ports.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    networks: [frontend]

networks:
  frontend:
  backend:
