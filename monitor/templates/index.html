<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Server Lab — Monitor</title>
  <style>
    :root {
      --bg: #0f1115; --card: #171a21; --line: #262b36;
      --text: #e6e9ef; --muted: #8b93a3; --accent: #4f9dff; --warn: #ff6b6b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font: 14px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      padding: 24px;
    }
    h1 { font-size: 18px; margin: 0 0 4px; }
    .sub { color: var(--muted); margin-bottom: 20px; font-size: 12px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 16px; }
    .card h2 { font-size: 12px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin: 0 0 12px; }
    .big { font-size: 28px; font-weight: 600; }
    .bar { height: 8px; background: var(--line); border-radius: 6px; overflow: hidden; margin-top: 8px; }
    .bar > span { display: block; height: 100%; background: var(--accent); }
    .bar.hot > span { background: var(--warn); }
    .row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid var(--line); }
    .row:last-child { border-bottom: 0; }
    .muted { color: var(--muted); }
    table { width: 100%; border-collapse: collapse; }
    td, th { text-align: left; padding: 4px 0; border-bottom: 1px solid var(--line); }
    th { color: var(--muted); font-weight: 500; }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #3ddc84; margin-right: 6px; }
  </style>
</head>
<body>
  <h1>Self-Hosted Server Lab</h1>
  <div class="sub">Live system monitor · refreshes every 3s · <span id="ts"></span></div>
  <div class="grid">
    <div class="card">
      <h2>CPU</h2>
      <div class="big"><span id="cpu">–</span>%</div>
      <div class="bar"><span id="cpu-bar" style="width:0%"></span></div>
      <div class="muted" id="cpu-cores" style="margin-top:8px"></div>
    </div>
    <div class="card">
      <h2>Memory</h2>
      <div class="big"><span id="mem">–</span>%</div>
      <div class="bar"><span id="mem-bar" style="width:0%"></span></div>
      <div class="muted" id="mem-detail" style="margin-top:8px"></div>
    </div>
    <div class="card">
      <h2>Disks</h2>
      <div id="disks"></div>
    </div>
    <div class="card">
      <h2>Temperatures</h2>
      <div id="temps" class="muted">–</div>
    </div>
    <div class="card">
      <h2>Containers</h2>
      <div id="containers" class="muted">–</div>
    </div>
    <div class="card" style="grid-column: 1 / -1;">
      <h2>Top processes</h2>
      <table>
        <thead><tr><th>PID</th><th>Name</th><th>CPU %</th><th>Mem %</th></tr></thead>
        <tbody id="procs"></tbody>
      </table>
    </div>
  </div>

  <script>
    function bar(el, pct) {
      el.style.width = pct + "%";
      el.parentElement.classList.toggle("hot", pct >= 85);
    }
    async function tick() {
      try {
        const r = await fetch("/api/stats");
        const d = await r.json();

        document.getElementById("ts").textContent = new Date(d.timestamp * 1000).toLocaleTimeString();

        document.getElementById("cpu").textContent = d.cpu.percent;
        bar(document.getElementById("cpu-bar"), d.cpu.percent);
        document.getElementById("cpu-cores").textContent = d.cpu.cores + " logical cores";

        document.getElementById("mem").textContent = d.memory.percent;
        bar(document.getElementById("mem-bar"), d.memory.percent);
        document.getElementById("mem-detail").textContent = d.memory.used_gb + " / " + d.memory.total_gb + " GB";

        document.getElementById("disks").innerHTML = d.disks.map(x =>
          `<div class="row"><span>${x.mount} <span class="muted">(${x.fstype})</span></span>
           <span>${x.used_gb}/${x.total_gb} GB · ${x.percent}%</span></div>`).join("") || '<span class="muted">–</span>';

        document.getElementById("temps").innerHTML = d.temps.length
          ? d.temps.map(t => `<div class="row"><span>${t.label}</span><span>${t.current} °C</span></div>`).join("")
          : "not exposed on this host";

        document.getElementById("containers").innerHTML = d.containers.length
          ? d.containers.map(c => `<div class="row"><span><span class="dot"></span>${c.name}</span><span class="muted">${c.status}</span></div>`).join("")
          : "docker socket not mounted";

        document.getElementById("procs").innerHTML = d.processes.map(p =>
          `<tr><td>${p.pid}</td><td>${p.name}</td><td>${p.cpu}</td><td>${p.mem}</td></tr>`).join("");
      } catch (e) {
        console.error(e);
      }
    }
    tick();
    setInterval(tick, 3000);
  </script>
</body>
</html>
